<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>bio/acc fund</title>

<style>

body{
margin:0;
background:#000;
color:#cfcfcf;
font-family:Courier New, monospace;
}

/* NAV */
.nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 40px;
background:#000;
border-bottom:1px solid #111;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
box-sizing:border-box;
}

.nav a{
color:#7CFF3A;
text-decoration:none;
margin-left:20px;
}

/* LAYOUT */
.container{
max-width:800px;
margin:auto;
padding:110px 20px 60px;
text-align:center;
}

h1{color:white;}
h2{color:#7CFF3A;margin-top:60px;}

.box{
border:1px solid #222;
padding:25px;
margin-top:20px;
text-align:left;
}

.project{
border:1px solid #222;
padding:20px;
margin-bottom:20px;
transition:0.3s;
}

/* 🥇 TOP 3 GLOW */
.top1{ border:1px solid gold; box-shadow:0 0 15px gold; }
.top2{ border:1px solid silver; box-shadow:0 0 10px silver; }
.top3{ border:1px solid #cd7f32; box-shadow:0 0 10px #cd7f32; }

input, textarea{
width:100%;
background:#050505;
border:1px solid #222;
color:#cfcfcf;
padding:10px;
margin-top:10px;
}

.vote-input{
width:70px;
padding:5px;
margin-top:10px;
text-align:center;
}

.button{
background:#7CFF3A;
color:black;
padding:10px 15px;
margin-top:15px;
cursor:pointer;
border:none;
}

.vote{
color:#7CFF3A;
cursor:pointer;
margin-top:10px;
}

.cooldown{
color:#888;
font-size:12px;
margin-top:5px;
}

.confirm-box{
border:1px solid #7CFF3A;
padding:12px;
margin-top:15px;
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
transition:0.2s;
}

.confirm-box.active{
background:#7CFF3A;
color:black;
}

.confirm-box input{ display:none; }

.rule{ margin-bottom:10px; }
.sub{ color:#888; font-size:13px; margin-left:10px; }

</style>

</head>

<body>

<div class="nav">
<div>bio/acc fund</div>
<div>
<a href="index.html">home</a>
<a href="manifesto.html">manifesto</a>
<a href="fund.html">fund</a>
</div>
</div>

<div class="container">

<h1>biotech startup fund</h1>

<button class="button" onclick="connectWallet()">connect wallet</button>
<div id="walletStatus"></div>

<h2>requirements</h2>
<div class="box">

<div class="rule">
• public github  
<div class="sub">must be active, not empty</div>
</div>

<div class="rule">
• 14+ days building  
<div class="sub">consistent commits required</div>
</div>

<div class="rule">
• social presence  
<div class="sub">community or audience proof</div>
</div>

</div>

<h2>submit project</h2>
<div class="box">

<input id="name" placeholder="project name">
<input id="github" placeholder="github link">
<input id="social" placeholder="social link">
<textarea id="desc" placeholder="description"></textarea>

<div class="confirm-box" onclick="toggleConfirm()" id="confirmBox">
<input type="checkbox" id="confirm">
✔ I confirm this project has been built for 14+ days
</div>

<button class="button" onclick="submitProject()">submit</button>
<div id="status"></div>

</div>

<!-- 🔥 HEADER WITH REFRESH -->
<div style="display:flex;justify-content:center;align-items:center;gap:15px;margin-top:60px;">
<h2 style="margin:0;">leaderboard</h2>
<button class="button" onclick="loadProjects()" style="padding:6px 12px;font-size:12px;">refresh</button>
</div>

<div id="feed"></div>

</div>

<script>

const HELIUS_KEY = "abe30281-08a6-4f68-921b-4da93db84835"
const TOKEN_MINT = "CLP3exiqE8drZSzwhPas257cTh1evzq6nr7i1Xwvpump"
const TOKENS_PER_VOTE = 1000000

let wallet = null
let tokenBalance = 0
let voteBank = 0

let voteTimestamps = JSON.parse(localStorage.getItem("voteTimestamps") || "{}")

function toggleConfirm(){
const box = document.getElementById("confirmBox")
const input = document.getElementById("confirm")
input.checked = !input.checked
box.classList.toggle("active")
}

async function connectWallet(){
if(!window.solana) return alert("install phantom")

const res = await window.solana.connect()
wallet = res.publicKey.toString()

tokenBalance = await getTokenBalance(wallet)
voteBank = Math.floor(tokenBalance / TOKENS_PER_VOTE)

document.getElementById("walletStatus").innerText =
`wallet: ${wallet.slice(0,4)}...${wallet.slice(-4)} 
| $bio/acc tokens: ${Math.floor(tokenBalance).toLocaleString()} 
| votes: ${voteBank}`
}

async function getTokenBalance(wallet){
const res = await fetch(`https://api.helius.xyz/v0/addresses/${wallet}/balances?api-key=${HELIUS_KEY}`)
const data = await res.json()
const token = data.tokens.find(t => t.mint === TOKEN_MINT)
if(!token) return 0
return token.amount / (10 ** (token.decimals || 6))
}

/* 🔥 ANIMATE VOTES */
function animateValue(el, start, end, duration=500){
let startTime = null
function step(timestamp){
if(!startTime) startTime = timestamp
const progress = Math.min((timestamp - startTime)/duration,1)
el.innerText = Math.floor(progress*(end-start)+start)
if(progress < 1) requestAnimationFrame(step)
}
requestAnimationFrame(step)
}

async function loadProjects(){

const feed = document.getElementById("feed")
feed.innerHTML = "[updating...]"

try {

const res = await fetch(
"https://raw.githubusercontent.com/cryptogatsu/bioacc/main/submissions.json?t="+Date.now(),
{ cache:"no-store" }
)

const data = await res.json()

if(!data.projects || !data.projects.length){
feed.innerHTML = "[no projects yet]"
return
}

/* 🔥 SORT */
const projects = data.projects.sort((a,b)=>(b.votes||0)-(a.votes||0))

feed.innerHTML = projects.map((p,i)=>{

const lastVote = voteTimestamps[i] || 0
const now = Date.now()
const remaining = 86400000 - (now - lastVote)

let locked = remaining > 0
let cooldownText = ""

if(locked){
const h = Math.floor(remaining/3600000)
const m = Math.floor((remaining%3600000)/60000)
cooldownText = `cooldown: ${h}h ${m}m`
}

let rankClass = ""
if(i===0) rankClass="top1"
if(i===1) rankClass="top2"
if(i===2) rankClass="top3"

return `
<div class="project ${rankClass}">

<b>${p.name || "Unnamed"}</b><br/><br/>
<a href="${p.github}" target="_blank">github</a><br/><br/>
${p.desc}<br/><br/>

votes: <span id="votes-${i}">${p.votes || 0}</span><br/><br/>

<input class="vote-input" id="vote-${i}" type="number" min="1" placeholder="votes">

<div class="vote" onclick="vote(${i})">
${locked ? "locked" : "vote"}
</div>

<div class="cooldown">${cooldownText}</div>

</div>
`

}).join("")

/* 🔥 ANIMATE AFTER RENDER */
projects.forEach((p,i)=>{
const el = document.getElementById(`votes-${i}`)
if(el) animateValue(el,0,p.votes||0)
})

} catch(err){
console.error(err)
feed.innerHTML = "error loading"
}

}

async function vote(index){

if(!wallet) return alert("connect wallet")

const lastVote = voteTimestamps[index] || 0
const now = Date.now()

if(now - lastVote < 86400000){
alert("wait for cooldown")
return
}

const amount = parseInt(document.getElementById(`vote-${index}`).value)

if(!amount || amount <= 0){
alert("enter votes")
return
}

if(amount > voteBank){
alert("not enough votes")
return
}

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"vote",
index,
weight:amount
})
})

voteTimestamps[index]=now
localStorage.setItem("voteTimestamps", JSON.stringify(voteTimestamps))

await loadProjects()
}

async function submitProject(){

if(!wallet) return alert("connect wallet")

if(!document.getElementById("confirm").checked){
alert("confirm 14+ days")
return
}

const name = document.getElementById("name").value.trim()
const github = document.getElementById("github").value.trim()
const social = document.getElementById("social").value.trim()
const desc = document.getElementById("desc").value.trim()

if(!name || !github || !desc){
alert("fill required fields")
return
}

const res = await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"submit",
data:{name,github,social,desc,votes:0,wallet}
})
})

const result = await res.json()

if(result.success){
document.getElementById("status").innerText="submitted ✅"
await loadProjects()
}else{
alert("submit failed")
}

}

loadProjects()

</script>

</body>
</html>
