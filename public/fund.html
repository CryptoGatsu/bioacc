<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>bio/acc fund</title>

<style>

body{
margin:0;
background:#000;
color:#cfcfcf;
font-family:Courier New, monospace;
}

.nav{
position:fixed;
top:0;
width:100%;
padding:15px 25px;
background:#000;
display:flex;
justify-content:space-between;
border-bottom:1px solid #111;
}

.nav a{color:#7CFF3A;text-decoration:none;margin-left:20px;}

.container{
max-width:800px;
margin:auto;
padding:100px 25px;
text-align:center;
}

.box{
border:1px solid #222;
padding:20px;
margin-top:20px;
text-align:left;
}

input,textarea{
width:100%;
margin-top:10px;
padding:10px;
background:#050505;
border:1px solid #222;
color:white;
}

.button{
background:#7CFF3A;
color:black;
padding:10px;
margin-top:15px;
cursor:pointer;
border:none;
}

/* ANIMATION */
.project{
opacity:0;
transform:translateY(10px);
animation:fadeIn 0.4s ease forwards;
}

@keyframes fadeIn{
to{opacity:1;transform:translateY(0);}
}

.vote{
color:#7CFF3A;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<div class="nav">
<div>bio/acc fund</div>
<div>
<a href="index.html">home</a>
<a href="manifesto.html">manifesto</a>
</div>
</div>

<div class="container">

<h1>biotech startup fund</h1>

<button class="button" onclick="connectWallet()">connect wallet</button>
<div id="walletStatus"></div>

<div class="box">
<input id="name" placeholder="project name">
<input id="github" placeholder="github link">
<input id="social" placeholder="social link">
<textarea id="desc" placeholder="description"></textarea>

<label>
<input type="checkbox" id="confirm">
 confirm 14+ days
</label>

<button class="button" onclick="submitProject()">submit</button>
<div id="status"></div>
</div>

<h2>leaderboard</h2>
<div id="feed"></div>

</div>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<script>

let wallet = null
const TOKEN_MINT = "CLP3exiqE8drZSzwhPas257cTh1evzq6nr7i1Xwvpump"

// WALLET
async function connectWallet(){
const res = await window.solana.connect()
wallet = res.publicKey.toString()
walletStatus.innerText = wallet.slice(0,4)+"..."+wallet.slice(-4)
}

// TOKEN BALANCE
async function getTokenBalance(address){

const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com")
const owner = new solanaWeb3.PublicKey(address)
const mint = new solanaWeb3.PublicKey(TOKEN_MINT)

const accounts = await connection.getParsedTokenAccountsByOwner(owner,{mint})

if(accounts.value.length === 0) return 0

return accounts.value[0].account.data.parsed.info.tokenAmount.uiAmount
}

// LOAD PROJECTS
async function loadProjects(){

const res = await fetch(
`https://api.github.com/repos/cryptogatsu/bioacc/contents/submissions.json?${Date.now()}`
)

const file = await res.json()
const data = JSON.parse(atob(file.content))

feed.innerHTML = ""

data.projects.forEach((p,i)=>{

const div = document.createElement("div")
div.className="project"

div.innerHTML=`
<b>${p.name}</b><br/>
<a href="${p.github}" target="_blank">github</a><br/>
${p.desc}<br/>
votes: ${p.votes||0}
<div class="vote" onclick="vote(${i})">↑ vote</div>
`

feed.appendChild(div)

})

}

// SUBMIT
async function submitProject(){

if(!wallet) return alert("connect wallet")

const payload={
action:"submit",
data:{
name:name.value,
github:github.value,
social:social.value,
desc:desc.value,
votes:0,
wallet
}
}

const res=await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
})

status.innerText="submitted ✅"
setTimeout(loadProjects,1500)

}

// VOTE
async function vote(index){

if(!wallet) return alert("connect wallet")

let voted = JSON.parse(localStorage.getItem("votes")||"{}")

if(voted[wallet]?.includes(index)){
alert("already voted")
return
}

const balance = await getTokenBalance(wallet)

if(balance <= 0){
alert("must hold token")
return
}

const weight = Math.floor(balance)

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"vote",
index,
wallet,
weight
})
})

if(!voted[wallet]) voted[wallet]=[]
voted[wallet].push(index)
localStorage.setItem("votes",JSON.stringify(voted))

setTimeout(loadProjects,1000)

}

loadProjects()
setInterval(loadProjects,5000)

</script>

</body>
</html>
