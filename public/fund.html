<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>bio/acc fund</title>

<style>
body{margin:0;background:#000;color:#cfcfcf;font-family:Courier New, monospace;}
.nav{position:fixed;top:0;width:100%;padding:15px 40px;background:#000;border-bottom:1px solid #111;display:flex;justify-content:space-between;}
.nav a{color:#7CFF3A;text-decoration:none;margin-left:20px;}
.container{max-width:900px;margin:auto;padding:110px 20px;}
.project{border:1px solid #222;padding:20px;margin-bottom:25px;display:flex;gap:20px;}
.logo{width:70px;height:70px;border:1px solid #222;}
.project-content{flex:1;}
.links a{color:#7CFF3A;margin-right:10px;font-size:13px;}
.desc{margin-top:10px;color:#aaa;}
.vote{color:#7CFF3A;cursor:pointer;margin-top:10px;}
.cooldown{color:#888;font-size:12px;}
.voted-today{color:#7CFF3A;font-size:12px;}
.button{background:#7CFF3A;color:black;padding:10px;cursor:pointer;border:none;}
.vote-input{width:70px;}
</style>
</head>

<body>

<div class="nav">
<div>bio/acc fund</div>
<div>
<a href="index.html">home</a>
<a href="manifesto.html">manifesto</a>
<a href="fund.html">fund</a>
</div>
</div>

<div class="container">

<h1>biotech startup fund</h1>

<button class="button" onclick="connectWallet()">connect wallet</button>
<div id="walletStatus"></div>

<h2>submit project</h2>

<input id="name" placeholder="project name">
<input id="github" placeholder="github">
<input id="social" placeholder="social">
<input id="website" placeholder="website">
<input type="file" id="logo">
<textarea id="desc"></textarea>

<button class="button" onclick="submitProject()">submit</button>
<div id="submitCooldown"></div>

<h2>leaderboard</h2>

<div id="feed"></div>

</div>

<script>

const TOKENS_PER_VOTE = 1000000

let wallet=null
let tokenBalance=0
let voteBank=0
let backendData=null

function timeLeft(ts){
const r=86400000-(Date.now()-ts)
if(r<=0) return ""
return `${Math.floor(r/3600000)}h ${Math.floor((r%3600000)/60000)}m`
}

async function signMessage(message){
const p=window.solana
const e=new TextEncoder().encode(message)
const s=await p.signMessage(e,"utf8")
return {signature:Array.from(s.signature)}
}

async function connectWallet(){
const r=await window.solana.connect()
wallet=r.publicKey.toString()

tokenBalance=await getTokenBalance(wallet)
voteBank=Math.floor(tokenBalance/TOKENS_PER_VOTE)

document.getElementById("walletStatus").innerText=
`wallet: ${wallet.slice(0,4)}... | tokens: ${Math.floor(tokenBalance)} | votes: ${voteBank}`

loadProjects()
}

async function getTokenBalance(wallet){
const res=await fetch(`https://api.helius.xyz/v0/addresses/${wallet}/balances?api-key=abe30281-08a6-4f68-921b-4da93db84835`)
const data=await res.json()
const t=data.tokens.find(x=>x.mint==="CLP3exiqE8drZSzwhPas257cTh1evzq6nr7i1Xwvpump")
return t? t.amount/(10**(t.decimals||6)) : 0
}

async function loadProjects(){

const res=await fetch("https://raw.githubusercontent.com/cryptogatsu/bioacc/main/submissions.json?t="+Date.now())
const data=await res.json()
backendData=data

const votedAt=data.votes?.[wallet]
const votedIndex=data.voteIndex?.[wallet]
const submitted=data.submissions?.[wallet]

if(submitted && Date.now()-submitted<86400000){
document.getElementById("submitCooldown").innerText=`submit cooldown: ${timeLeft(submitted)}`
}

let html=data.projects.map((p,i)=>{

const votedToday=votedAt && Date.now()-votedAt<86400000

return `
<div class="project">

${p.logo?`<img class="logo" src="${p.logo}">`:""}

<div class="project-content">

<b>${p.name}</b>

<div class="links">
<a href="${p.github}" target="_blank">github</a>
<a href="${p.social}" target="_blank">social</a>
${p.website?`<a href="${p.website}" target="_blank">website</a>`:""}
</div>

<div class="desc">${p.desc}</div>

votes: ${p.votes||0}

${votedToday && votedIndex===i ? `<div class="voted-today">✔ you voted here today</div>`:""}

<input class="vote-input" id="vote-${i}" placeholder="votes">

<div class="vote" onclick="vote(${i})">
${votedToday?"locked":"vote"}
</div>

<div class="cooldown">
${votedToday?`cooldown: ${timeLeft(votedAt)}`:""}
</div>

</div>
</div>
`
}).join("")

document.getElementById("feed").innerHTML=html
}

async function vote(i){

if(!wallet) return alert("connect wallet")

const votedAt=backendData.votes?.[wallet]
if(votedAt && Date.now()-votedAt<86400000) return alert("already voted")

const amount=parseInt(document.getElementById(`vote-${i}`).value)||1

const t=Date.now()
const m=`vote:${wallet}:${i}:${t}`
const s=await signMessage(m)

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"vote",
index:i,
weight:amount,
wallet,
timestamp:t,
signature:s.signature,
message:m
})
})

loadProjects()
}

async function submitProject(){

if(!wallet) return alert("connect wallet")

const last=backendData.submissions?.[wallet]
if(last && Date.now()-last<86400000) return alert("already submitted")

const name=document.getElementById("name").value

const t=Date.now()
const m=`submit:${wallet}:${t}`
const s=await signMessage(m)

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"submit",
data:{name,wallet,timestamp:t,signature:s.signature,message:m}
})
})

loadProjects()
}

</script>

</body>
</html>
