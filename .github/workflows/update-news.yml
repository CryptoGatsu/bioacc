name: Update Bioacc Intelligence Feed

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch biotech news
        run: |
          curl -s "https://news.google.com/rss/search?q=biotech+crispr+longevity+ai+biology&hl=en-US&gl=US&ceid=US:en" > feed.xml

      - name: Convert RSS to JSON
        run: |
          sudo apt-get install -y jq
          titles=$(grep -oP '(?<=<title>).*?(?=</title>)' feed.xml | tail -n +2 | head -n 8)

          printf '{\n' > news.json
          printf '  "lastUpdated": "%s",\n' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> news.json
          printf '  "items": [\n' >> news.json

          i=0
          while read -r line; do
            if [ $i -gt 0 ]; then printf ",\n" >> news.json; fi
            printf '    "%s"' "$line" >> news.json
            i=$((i+1))
          done <<< "$titles"

          printf '\n  ]\n}' >> news.json

      - name: Commit updated feed
        run: |
          git config --global user.name "bioacc-bot"
          git config --global user.email "bot@bioacc"

          git add news.json
          git commit -m "update biotech intelligence feed" || echo "no changes"

          git push