<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>bio/acc fund</title>

<style>

body{
margin:0;
background:#000;
color:#cfcfcf;
font-family:Courier New, monospace;
line-height:1.7;
}

/* NAV */
.nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 25px;
background:rgba(0,0,0,0.9);
border-bottom:1px solid #111;
display:flex;
justify-content:space-between;
align-items:center;
box-sizing:border-box;
z-index:10;
}

.nav a{
color:#7CFF3A;
text-decoration:none;
margin-left:20px;
}

.nav a.active{
opacity:0.6;
pointer-events:none;
}

/* LAYOUT */
.container{
max-width:800px;
margin:auto;
padding:100px 25px 60px;
text-align:center;
}

h1{color:white;font-weight:normal;}
h2{color:#7CFF3A;margin-top:60px;}

/* BOX */
.box{
border:1px solid #222;
padding:25px;
margin-top:20px;
text-align:left;
}

/* FORM */
input, textarea{
width:100%;
background:#050505;
border:1px solid #222;
color:#cfcfcf;
padding:10px;
margin-top:10px;
font-family:inherit;
}

textarea{
height:120px;
resize:none;
}

/* BUTTON */
.button{
background:#7CFF3A;
color:black;
padding:12px 20px;
display:inline-block;
margin-top:15px;
cursor:pointer;
border:none;
font-family:inherit;
}

/* STATUS */
.status{
margin-top:10px;
font-size:14px;
}
.success{color:#7CFF3A;}
.error{color:#ff4d4d;}

/* PROJECTS */
.project{
border-bottom:1px solid #222;
padding:15px 0;
}

.vote{
color:#7CFF3A;
cursor:pointer;
margin-top:10px;
display:inline-block;
}

.project a{
color:#7CFF3A;
text-decoration:none;
}

</style>

</head>

<body>

<!-- NAV -->
<div class="nav">
<div>bio/acc fund</div>
<div>
<a href="index.html">home</a>
<a href="manifesto.html">manifesto</a>
<a href="fund.html" class="active">fund</a>
</div>
</div>

<div class="container">

<h1>biotech startup fund</h1>

<!-- WALLET -->
<button class="button" onclick="connectWallet()">connect wallet</button>
<div id="walletStatus" style="margin-top:10px;color:#777;"></div>

<!-- REQUIREMENTS -->
<h2>submission requirements</h2>

<div class="box">
• Must have a <b>public GitHub repository</b><br>
• Must have been building for <b>at least 14 days</b><br>
• Must have a <b>public social media profile</b>
</div>

<!-- FORM -->
<h2>submit project</h2>

<div class="box">

<input id="name" placeholder="project name">
<input id="github" placeholder="github link">
<input id="social" placeholder="social link">

<textarea id="desc" placeholder="description"></textarea>

<label style="margin-top:10px;display:block;">
<input type="checkbox" id="confirm">
 I confirm this project has been worked on for 14+ days
</label>

<button class="button" onclick="submitProject()">submit</button>

<div id="status" class="status"></div>

</div>

<!-- LEADERBOARD -->
<h2>leaderboard</h2>

<div class="box" id="feed">[loading projects...]</div>

</div>

<script>

let wallet = null

const GITHUB_URL = "https://raw.githubusercontent.com/cryptogatsu/bioacc/main/submissions.json"

// CONNECT WALLET
async function connectWallet(){
if(window.solana){
const res = await window.solana.connect()
wallet = res.publicKey.toString()
document.getElementById("walletStatus").innerText =
"connected: " + wallet.slice(0,4) + "..." + wallet.slice(-4)
}else{
alert("install phantom wallet")
}
}

// LOAD PROJECTS
async function loadProjects(){

const feed = document.getElementById("feed")

try{

const res = await fetch(GITHUB_URL + "?cache=" + Date.now(), {
cache: "no-store"
})

const data = await res.json()

let projects = data.projects || []

if(projects.length === 0){
feed.innerHTML = "[no projects yet]"
return
}

// sort by votes
projects.sort((a,b)=>b.votes - a.votes)

let html = ""

projects.forEach((p,i)=>{

html += `
<div class="project">
> #${i+1} ${p.name} (${p.votes} votes)

github: <a href="${p.github}" target="_blank">${p.github}</a>
social: <a href="${p.social}" target="_blank">${p.social}</a>

${p.desc}

<div class="vote" onclick="vote(${i})">↑ upvote</div>
</div>
`
})

feed.innerHTML = html

}catch{
feed.innerHTML = "[error loading projects]"
}

}

// SUBMIT
async function submitProject(){

if(!wallet){
alert("connect wallet first")
return
}

const status = document.getElementById("status")

try{

const res = await fetch("/api/update", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
action: "submit",
data: {
name: document.getElementById("name").value,
github: document.getElementById("github").value,
social: document.getElementById("social").value,
desc: document.getElementById("desc").value,
wallet: wallet,
votes: 0,
time: Date.now()
}
})
})

const result = await res.json()

if(!res.ok){
throw new Error(result.error || "submit failed")
}

status.innerHTML = "<span style='color:#5CFF5C'>submitted</span>"

loadProjects()

}catch(err){

console.error(err)
status.innerHTML = "<span style='color:red'>"+err.message+"</span>"

}
}

// VOTE
async function vote(index){

if(!wallet){
alert("connect wallet")
return
}

try{

await fetch("/api/update", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({
action: "vote",
index,
wallet
})
})

loadProjects()

}catch{
alert("vote failed")
}

}

// INIT
loadProjects()
setInterval(loadProjects, 60000)

</script>

</body>
</html>
