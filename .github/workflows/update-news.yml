name: Update Bioacc Intelligence Feed

permissions:
  contents: write

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch biotech intelligence
        run: |

          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          GOOGLE=$(curl -s "https://news.google.com/rss/search?q=biotech&hl=en-US&gl=US&ceid=US:en" | grep "<title>" | sed -n '2,5p' | sed 's/<[^>]*>//g')

          ARXIV=$(curl -s "https://export.arxiv.org/rss/q-bio" | grep "<title>" | sed -n '2,4p' | sed 's/<[^>]*>//g')

          LONGEVITY=$(curl -s "https://news.google.com/rss/search?q=longevity+biotech&hl=en-US&gl=US&ceid=US:en" | grep "<title>" | sed -n '2,3p' | sed 's/<[^>]*>//g')

          echo "{" > news.json
          echo "\"lastUpdated\":\"$NOW\"," >> news.json
          echo "\"items\":[" >> news.json

          echo "$GOOGLE" | sed 's/^/\"[NEWS] /;s/$/\",/' >> news.json
          echo "$LONGEVITY" | sed 's/^/\"[LONGEVITY] /;s/$/\",/' >> news.json
          echo "$ARXIV" | sed 's/^/\"[ARXIV] /;s/$/\",/' >> news.json

          sed -i '$ s/,$//' news.json

          echo "]}" >> news.json

      - name: Commit update
        run: |
          git config --global user.name "bioacc-bot"
          git config --global user.email "bot@bioacc"

          git add news.json
          git commit -m "update biotech intelligence feed" || echo "no changes"
          git push