<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>bio/acc fund</title>

<style>

body{
margin:0;
background:#000;
color:#cfcfcf;
font-family:Courier New, monospace;
line-height:1.7;
}

/* NAV */
.nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 25px;
background:rgba(0,0,0,0.9);
border-bottom:1px solid #111;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
}

.nav a{
color:#7CFF3A;
text-decoration:none;
margin-left:20px;
}

.nav a.active{
opacity:0.6;
pointer-events:none;
}

/* LAYOUT */
.container{
max-width:800px;
margin:auto;
padding:100px 25px 60px;
text-align:center;
}

h1{color:white;font-weight:normal;}
h2{color:#7CFF3A;margin-top:60px;}

.box{
border:1px solid #222;
padding:25px;
margin-top:20px;
text-align:left;
}

input, textarea{
width:100%;
background:#050505;
border:1px solid #222;
color:#cfcfcf;
padding:10px;
margin-top:10px;
font-family:inherit;
}

textarea{height:120px;resize:none;}

.button{
background:#7CFF3A;
color:black;
padding:12px 20px;
margin-top:15px;
cursor:pointer;
border:none;
}

.status{margin-top:10px;}
.project{border-bottom:1px solid #222;padding:15px 0;}
.vote{color:#7CFF3A;cursor:pointer;margin-top:10px;}
a{color:#7CFF3A;}

</style>

</head>

<body>

<div class="nav">
<div>bio/acc fund</div>
<div>
<a href="index.html">home</a>
<a href="manifesto.html">manifesto</a>
<a href="fund.html" class="active">fund</a>
</div>
</div>

<div class="container">

<h1>biotech startup fund</h1>

<button class="button" onclick="connectWallet()">connect wallet</button>
<div id="walletStatus"></div>

<h2>requirements</h2>
<div class="box">
• public github<br>
• 14+ days building<br>
• social presence
</div>

<h2>submit project</h2>
<div class="box">

<input id="name" placeholder="project name">
<input id="github" placeholder="github link">
<input id="social" placeholder="social link">
<textarea id="desc" placeholder="description"></textarea>

<label>
<input type="checkbox" id="confirm">
 confirm 14+ days
</label>

<button class="button" onclick="submitProject()">submit</button>
<div id="status"></div>

</div>

<h2>leaderboard</h2>
<div class="box" id="feed">[loading...]</div>

</div>

<script>

let wallet = null

const DATA_URL = "https://raw.githubusercontent.com/cryptogatsu/bioacc/main/submissions.json"

// WALLET
async function connectWallet(){
if(window.solana){
const res = await window.solana.connect()
wallet = res.publicKey.toString()
document.getElementById("walletStatus").innerText =
"connected: " + wallet.slice(0,4) + "..." + wallet.slice(-4)
}else{
alert("install phantom")
}
}

// LOAD PROJECTS
async function loadProjects(){

const res = await fetch("https://raw.githubusercontent.com/cryptogatsu/bioacc/main/submissions.json")

const data = await res.json()

const feed = document.getElementById("feed")

if(!data.projects || data.projects.length === 0){
feed.innerHTML = "[no projects yet]"
return
}

feed.innerHTML = data.projects.map((p, i) => `
<div style="margin-bottom:20px">
<b>${p.name}</b><br/>
<a href="${p.github}" target="_blank">github</a><br/>
${p.desc}<br/>
votes: ${p.votes || 0}
</div>
`).join("")
}

// SUBMIT
async function submitProject(){

try {

if(!wallet){
alert("connect wallet first")
return
}

const name = document.getElementById("name").value
const github = document.getElementById("github").value
const social = document.getElementById("social").value
const desc = document.getElementById("desc").value

if(!name || !github || !desc){
alert("fill required fields")
return
}

const payload = {
action: "submit",
data: {
name,
github,
social,
desc,
votes: 0,
wallet
}
}

const res = await fetch("/api/update", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(payload)
})

const result = await res.json()

console.log("SUBMIT RESULT:", result)

if(result.success){
document.getElementById("status").innerText = "submitted ✅"
loadProjects()
} else {
alert("error submitting")
}

} catch (err){
console.error(err)
alert("submit failed")
}

}

// VOTE
async function vote(index){

if(!wallet) return alert("connect wallet")

await fetch("/api/update", {
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({
action:"vote",
index,
wallet
})
})

loadProjects()
}

// INIT
loadProjects()
setInterval(loadProjects, 30000)

</script>

</body>
</html>
