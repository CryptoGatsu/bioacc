name: Update Bioacc Intelligence Feed

permissions:
  contents: write

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Fetch biotech news
        run: |
          curl -s "https://news.google.com/rss/search?q=biotech+crispr+longevity+ai+biology&hl=en-US&gl=US&ceid=US:en" > google.xml
          curl -s "https://export.arxiv.org/rss/q-bio" > arxiv.xml
          curl -s "https://www.nature.com/subjects/biotechnology.rss" > nature.xml
          curl -s "https://longevity.technology/news/feed/" > longevity.xml

          cat google.xml arxiv.xml nature.xml longevity.xml > feed.xml
          cat google.xml arxiv.xml nature.xml > feed.xml

      - name: Convert RSS feeds to tagged JSON
        run: |
          sudo apt-get install -y jq

          news=$(grep -oP '(?<=<title>).*?(?=</title>)' google.xml | tail -n +2 | head -n 6 | sed 's/^/[NEWS] /')
          arxiv=$(grep -oP '(?<=<title>).*?(?=</title>)' arxiv.xml | tail -n +2 | head -n 5 | sed 's/^/[ARXIV] /')
          nature=$(grep -oP '(?<=<title>).*?(?=</title>)' nature.xml | tail -n +2 | head -n 5 | sed 's/^/[NATURE] /')
          longevity=$(grep -oP '(?<=<title>).*?(?=</title>)' longevity.xml | tail -n +2 | head -n 4 | sed 's/^/[LONGEVITY] /')

          printf '{\n' > news.json
          printf '  "lastUpdated": "%s",\n' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> news.json
          printf '  "items": [\n' >> news.json

          combined=$(printf "%s\n%s\n%s\n%s" "$news" "$arxiv" "$nature" "$longevity" | head -n 20)

          i=0
          while read -r line; do
            if [ $i -gt 0 ]; then printf ",\n" >> news.json; fi
            printf '    "%s"' "$line" >> news.json
            i=$((i+1))
          done <<< "$combined"

          printf '\n  ]\n}' >> news.json

      - name: Commit updated feed
        run: |
          git config --global user.name "bioacc-bot"
          git config --global user.email "bot@bioacc"

          git add news.json
          git commit -m "update biotech intelligence feed" || echo "no changes"

          git push