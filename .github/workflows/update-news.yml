name: Update Bioacc Intelligence Feed

permissions:
  contents: write

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch biotech intelligence
        run: |
          cat << 'EOF' > script.py
          import requests
          import xml.etree.ElementTree as ET
          from datetime import datetime
          import json

          def fetch_rss(url, label, limit=3):
              try:
                  res = requests.get(url, timeout=10)
                  root = ET.fromstring(res.content)

                  items = []
                  for item in root.findall(".//item")[:limit]:
                      title = item.find("title").text.strip()
                      items.append(f"[{label}] {title}")

                  return items

              except Exception:
                  return [f"[{label}] error fetching data"]

          google_biotech = fetch_rss(
              "https://news.google.com/rss/search?q=biotech&hl=en-US&gl=US&ceid=US:en",
              "NEWS",
              4
          )

          google_longevity = fetch_rss(
              "https://news.google.com/rss/search?q=longevity+biotech&hl=en-US&gl=US&ceid=US:en",
              "LONGEVITY",
              3
          )

          arxiv = fetch_rss(
              "https://export.arxiv.org/rss/q-bio",
              "ARXIV",
              3
          )

          data = {
              "lastUpdated": datetime.utcnow().isoformat() + "Z",
              "items": google_biotech + google_longevity + arxiv
          }

          with open("news.json", "w") as f:
              json.dump(data, f, indent=2)

          print("Updated news.json successfully")
          EOF

          python script.py

      - name: Commit update
        run: |
          git config --global user.name "bioacc-bot"
          git config --global user.email "bot@bioacc"

          git add news.json
          git commit -m "update biotech intelligence feed" || echo "no changes"
          git push