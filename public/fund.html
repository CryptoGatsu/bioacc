<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>bio/acc fund</title>

<style>

body{
margin:0;
background:#000;
color:#cfcfcf;
font-family:Courier New, monospace;
}

/* NAV */
.nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 40px;
background:#000;
border-bottom:1px solid #111;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

.nav a{
color:#7CFF3A;
text-decoration:none;
margin-left:20px;
}

/* LAYOUT */
.container{
max-width:900px;
margin:auto;
padding:110px 20px 80px;
text-align:center;
}

h1{color:white;}
h2{color:#7CFF3A;margin-top:60px;}

.box{
border:1px solid #222;
padding:25px;
margin-top:20px;
text-align:left;
}

/* PROJECT CARD */
.project{
border:1px solid #222;
padding:20px;
margin-bottom:25px;
display:flex;
gap:20px;
align-items:flex-start;
}

/* LOGO */
.logo{
width:70px;
height:70px;
background:#111;
border:1px solid #222;
object-fit:cover;
}

/* CONTENT */
.project-content{
flex:1;
text-align:left;
}

.links a{
color:#7CFF3A;
margin-right:10px;
font-size:13px;
}

.desc{
margin-top:10px;
color:#aaa;
font-size:14px;
}

/* TOP 3 */
.top1{ border:1px solid gold; box-shadow:0 0 15px gold; }
.top2{ border:1px solid silver; box-shadow:0 0 10px silver; }
.top3{ border:1px solid #cd7f32; box-shadow:0 0 10px #cd7f32; }

input, textarea{
width:100%;
background:#050505;
border:1px solid #222;
color:#cfcfcf;
padding:10px;
margin-top:10px;
}

.vote-input{
width:70px;
padding:5px;
margin-top:10px;
}

.button{
background:#7CFF3A;
color:black;
padding:10px 15px;
margin-top:15px;
cursor:pointer;
border:none;
}

.vote{
color:#7CFF3A;
cursor:pointer;
margin-top:10px;
}

.cooldown{
color:#888;
font-size:12px;
}

.confirm-box{
border:1px solid #7CFF3A;
padding:12px;
margin-top:15px;
cursor:pointer;
}

.confirm-box.active{
background:#7CFF3A;
color:black;
}

#ticker{
position:fixed;
bottom:0;
width:100%;
background:#050505;
border-top:1px solid #222;
color:#7CFF3A;
font-size:12px;
padding:8px;
overflow:hidden;
white-space:nowrap;
}

#ticker span{
display:inline-block;
padding-left:100%;
animation:scroll 15s linear infinite;
}

@keyframes scroll{
0%{ transform:translateX(0);}
100%{ transform:translateX(-100%);}
}

</style>

</head>

<body>

<div class="nav">
<div>bio/acc fund</div>
<div>
<a href="index.html">home</a>
<a href="manifesto.html">manifesto</a>
<a href="fund.html">fund</a>
</div>
</div>

<div class="container">

<h1>biotech startup fund</h1>

<button class="button" onclick="connectWallet()">connect wallet</button>
<div id="walletStatus"></div>

<h2>submit project</h2>
<div class="box">

<input id="name" placeholder="project name (required)">
<input id="github" placeholder="github link (required)">
<input id="social" placeholder="social link (required)">
<input id="website" placeholder="website (optional)">
<input type="file" id="logo" accept="image/*">
<textarea id="desc" placeholder="description"></textarea>

<div class="confirm-box" onclick="toggleConfirm()" id="confirmBox">
✔ confirm 14+ days
<input type="checkbox" id="confirm" hidden>
</div>

<button class="button" onclick="submitProject()">submit</button>
<div id="status"></div>

</div>

<h2>leaderboard</h2>
<div id="feed"></div>

</div>

<div id="ticker"></div>

<script>

const TOKENS_PER_VOTE = 1000000
let wallet = null
let voteTimestamps = JSON.parse(localStorage.getItem("voteTimestamps") || "{}")

function toggleConfirm(){
const box = document.getElementById("confirmBox")
const input = document.getElementById("confirm")
input.checked = !input.checked
box.classList.toggle("active")
}

async function connectWallet(){
const res = await window.solana.connect()
wallet = res.publicKey.toString()
document.getElementById("walletStatus").innerText = wallet
}

function addTicker(text){
document.getElementById("ticker").innerHTML = `<span>${text}</span>`
}

function getProjectId(p){
return p.github || p.name
}

async function loadProjects(){

const res = await fetch("https://raw.githubusercontent.com/cryptogatsu/bioacc/main/submissions.json?t="+Date.now())
const data = await res.json()

const projects = data.projects.sort((a,b)=>(b.votes||0)-(a.votes||0))

document.getElementById("feed").innerHTML = projects.map((p,i)=>{

const id = getProjectId(p)

const lastVote = voteTimestamps[id] || 0
const remaining = 86400000 - (Date.now() - lastVote)
const locked = remaining > 0

let rank = i===0?"top1":i===1?"top2":i===2?"top3":""

return `
<div class="project ${rank}">

<img class="logo" src="${p.logo || ''}">

<div class="project-content">

<b>${p.name}</b>

<div class="links">
<a href="${p.github}" target="_blank">github</a>
<a href="${p.social}" target="_blank">social</a>
${p.website ? `<a href="${p.website}" target="_blank">website</a>` : ""}
</div>

<div class="desc">${p.desc}</div>

<br>
votes: ${p.votes||0}

<br><br>

<input class="vote-input" id="vote-${i}" placeholder="votes">

<div class="vote" onclick="vote('${id}',${i})">
${locked ? "locked" : "vote"}
</div>

<div class="cooldown">
${locked ? "cooldown active" : ""}
</div>

</div>
</div>
`

}).join("")
}

async function vote(id,index){

const lastVote = voteTimestamps[id] || 0

if(Date.now() - lastVote < 86400000){
alert("cooldown")
return
}

const amount = parseInt(document.getElementById(`vote-${index}`).value)

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({action:"vote",index,weight:amount})
})

voteTimestamps[id]=Date.now()
localStorage.setItem("voteTimestamps", JSON.stringify(voteTimestamps))

addTicker(`${amount} votes → ${id}`)

loadProjects()
}

async function submitProject(){

if(!document.getElementById("confirm").checked){
alert("confirm 14+ days")
return
}

const name = document.getElementById("name").value.trim()
const github = document.getElementById("github").value.trim()
const social = document.getElementById("social").value.trim()
const website = document.getElementById("website").value.trim()
const desc = document.getElementById("desc").value.trim()

if(!name || !github || !social){
alert("name, github, social required")
return
}

/* LOGO TO BASE64 */
const file = document.getElementById("logo").files[0]
let logo = ""

if(file){
logo = await new Promise(resolve=>{
const reader = new FileReader()
reader.onload = () => resolve(reader.result)
reader.readAsDataURL(file)
})
}

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"submit",
data:{name,github,social,website,desc,logo,votes:0,wallet}
})
})

document.getElementById("status").innerText="submitted ✅"
loadProjects()
}

loadProjects()

</script>

</body>
</html>
