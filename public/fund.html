<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>bio/acc fund</title>

<style>

body{
margin:0;
background:#000;
color:#cfcfcf;
font-family:Courier New, monospace;
}

/* NAV FIX */
.nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 25px;
background:#000;
border-bottom:1px solid #111;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
box-sizing:border-box;
}

.nav a{
color:#7CFF3A;
text-decoration:none;
margin-left:20px;
}

/* LAYOUT */
.container{
max-width:800px;
margin:auto;
padding:120px 25px 60px;
text-align:center;
}

/* BOX */
.box{
border:1px solid #222;
padding:20px;
margin-top:20px;
text-align:left;
}

/* INPUTS */
input, textarea{
width:100%;
margin-top:10px;
padding:10px;
background:#050505;
border:1px solid #222;
color:white;
}

/* BUTTON */
.button{
background:#7CFF3A;
color:black;
padding:10px;
margin-top:15px;
cursor:pointer;
border:none;
}

/* PROJECT CARDS */
.project{
border:1px solid #222;
padding:15px;
margin-bottom:20px;
background:#050505;
border-radius:6px;
animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.vote{
color:#7CFF3A;
cursor:pointer;
margin-top:10px;
}

.small{
color:#777;
font-size:12px;
}

</style>

</head>

<body>

<div class="nav">
<div>bio/acc fund</div>
<div>
<a href="index.html">home</a>
<a href="manifesto.html">manifesto</a>
</div>
</div>

<div class="container">

<h1>biotech startup fund</h1>

<button class="button" onclick="connectWallet()">connect wallet</button>
<div id="walletStatus"></div>

<div class="box">

<input id="name" placeholder="project name">
<input id="github" placeholder="github link">
<input id="social" placeholder="social link">
<textarea id="desc" placeholder="description"></textarea>

<label>
<input type="checkbox" id="confirm">
 confirm 14+ days
</label>

<button class="button" onclick="submitProject()">submit</button>
<div id="status"></div>

</div>

<h2>leaderboard</h2>
<div id="feed">loading...</div>

</div>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<script>

let wallet = null

const connection = new solanaWeb3.Connection(
"https://mainnet.helius-rpc.com/?api-key=abe30281-08a6-4f68-921b-4da93db84835"
)

// 🔥 PUT YOUR REAL TOKEN MINT HERE
const TOKEN_MINT = "CLP3exiqE8drZSzwhPas257cTh1evzq6nr7i1Xwvpump"

// WALLET
async function connectWallet(){

if(!window.solana){
alert("install phantom")
return
}

const res = await window.solana.connect()
wallet = res.publicKey.toString()

const bal = await getTokenBalance(wallet)

document.getElementById("walletStatus").innerText =
`connected: ${wallet.slice(0,4)}...${wallet.slice(-4)} (${bal} tokens)`
}

// TOKEN BALANCE
async function getTokenBalance(address){

try {

const owner = new solanaWeb3.PublicKey(address)
const mint = new solanaWeb3.PublicKey(TOKEN_MINT)

const accounts = await connection.getParsedTokenAccountsByOwner(owner,{mint})

if(accounts.value.length === 0) return 0

return accounts.value[0].account.data.parsed.info.tokenAmount.uiAmount

} catch(err){
console.error("TOKEN ERROR:", err)
return 0
}

}

// LOAD PROJECTS (FIXED)
async function loadProjects(){

try {

const res = await fetch(
`https://api.github.com/repos/cryptogatsu/bioacc/contents/submissions.json?${Date.now()}`
)

const file = await res.json()

if(!file.content){
document.getElementById("feed").innerText = "error loading"
return
}

const data = JSON.parse(atob(file.content))

const feed = document.getElementById("feed")
feed.innerHTML = ""

if(!data.projects || data.projects.length === 0){
feed.innerText = "[no projects yet]"
return
}

data.projects.forEach((p,i)=>{

const div = document.createElement("div")
div.className="project"

div.innerHTML=`
<b>${p.name}</b><br/><br/>
<a href="${p.github}" target="_blank">github</a><br/><br/>
${p.desc}<br/><br/>
votes: ${p.votes || 0}
<div class="vote" onclick="vote(${i})">↑ vote</div>
`

feed.appendChild(div)

})

} catch(err){
console.error("LOAD ERROR:", err)
document.getElementById("feed").innerText = "failed to load"
}

}

// SUBMIT (FIXED CHECKBOX BUG)
async function submitProject(){

if(!wallet){
alert("connect wallet first")
return
}

// 🔥 FIXED THIS LINE
if(!document.getElementById("confirm").checked){
alert("confirm 14+ days")
return
}

const payload = {
action:"submit",
data:{
name:document.getElementById("name").value,
github:document.getElementById("github").value,
social:document.getElementById("social").value,
desc:document.getElementById("desc").value,
votes:0,
wallet
}
}

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
})

document.getElementById("status").innerText = "submitted ✅"

setTimeout(loadProjects,1500)

}

// VOTE
async function vote(index){

if(!wallet) return alert("connect wallet")

const balance = await getTokenBalance(wallet)

if(balance <= 0){
alert("no tokens detected")
return
}

const weight = Math.floor(balance)

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"vote",
index,
wallet,
weight
})
})

setTimeout(loadProjects,1000)

}

// INIT
loadProjects()
setInterval(loadProjects,5000)

</script>

</body>
</html>
