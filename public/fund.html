<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>bio/acc fund</title>

<style>

body{
margin:0;
background:#000;
color:#cfcfcf;
font-family:Courier New, monospace;
}

.nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 25px;
background:#000;
border-bottom:1px solid #111;
display:flex;
justify-content:space-between;
}

.nav a{
color:#7CFF3A;
margin-left:20px;
text-decoration:none;
}

.container{
max-width:800px;
margin:auto;
padding:100px 25px;
text-align:center;
}

h1{color:white;}
h2{color:#7CFF3A;margin-top:60px;}

.box{
border:1px solid #222;
padding:25px;
margin-top:20px;
text-align:left;
}

input, textarea{
width:100%;
background:#050505;
border:1px solid #222;
color:#cfcfcf;
padding:10px;
margin-top:10px;
}

.button{
background:#7CFF3A;
color:black;
padding:10px 15px;
cursor:pointer;
border:none;
margin-top:15px;
}

.project{
border-bottom:1px solid #222;
padding:15px 0;
}

.vote{
color:#7CFF3A;
cursor:pointer;
margin-top:10px;
display:inline-block;
}

</style>

</head>

<body>

<div class="nav">
<div>bio/acc fund</div>
<div>
<a href="index.html">home</a>
<a href="manifesto.html">manifesto</a>
<a href="fund.html">fund</a>
</div>
</div>

<div class="container">

<h1>biotech startup fund</h1>

<button class="button" onclick="connectWallet()">connect wallet</button>
<div id="walletStatus"></div>

<h2>submit project</h2>

<div class="box">

<input id="name" placeholder="project name">
<input id="github" placeholder="github link">
<input id="social" placeholder="social link">
<textarea id="desc" placeholder="description"></textarea>

<button class="button" onclick="submitProject()">submit</button>
<div id="status"></div>

</div>

<h2>leaderboard</h2>

<div class="box" id="feed"></div>

</div>

<script>

let wallet=null

async function connectWallet(){
if(window.solana){
const res=await window.solana.connect()
wallet=res.publicKey.toString()
document.getElementById("walletStatus").innerText="connected: "+wallet.slice(0,4)+"..."+wallet.slice(-4)
}else{
alert("install phantom")
}
}

// SUBMIT
function submitProject(){

if(!wallet){
alert("connect wallet first")
return
}

let submissions=JSON.parse(localStorage.getItem("projects")||"[]")

// prevent duplicate submission
if(submissions.find(p=>p.wallet===wallet)){
alert("wallet already submitted")
return
}

const project={
name:document.getElementById("name").value,
github:document.getElementById("github").value,
social:document.getElementById("social").value,
desc:document.getElementById("desc").value,
wallet,
votes:0
}

submissions.push(project)
localStorage.setItem("projects",JSON.stringify(submissions))

render()

}

// VOTE
function vote(index){

if(!wallet){
alert("connect wallet")
return
}

let votes=JSON.parse(localStorage.getItem("votes")||"{}")

if(votes[wallet]?.includes(index)){
alert("already voted")
return
}

let submissions=JSON.parse(localStorage.getItem("projects")||"[]")

submissions[index].votes++

localStorage.setItem("projects",JSON.stringify(submissions))

if(!votes[wallet]) votes[wallet]=[]
votes[wallet].push(index)

localStorage.setItem("votes",JSON.stringify(votes))

render()

}

// RENDER
function render(){

let submissions=JSON.parse(localStorage.getItem("projects")||"[]")

submissions.sort((a,b)=>b.votes-a.votes)

let html=""

submissions.forEach((p,i)=>{

html+=`
<div class="project">
> #${i+1} ${p.name} (${p.votes} votes)

github: ${p.github}
social: ${p.social}

${p.desc}

<div class="vote" onclick="vote(${i})">↑ upvote</div>
</div>
`
})

document.getElementById("feed").innerHTML=html || "[no projects]"

}

render()

</script>

</body>
</html>
