name: Update Bioacc Intelligence Feed

permissions:
  contents: write

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate intelligence feed
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat <<EOF > news.json
          {
            "lastUpdated": "$NOW",
            "items": [
              "[NEWS] AI biotech startup raises $50m for protein design",
              "[NEWS] CRISPR therapy shows promise in human trials",
              "[NEWS] longevity biotech funding hits record levels",
              "[NEWS] desci project launches open genome dataset",
              "[NEWS] protein llm models accelerate drug discovery",
              "[NEWS] synthetic biology company engineers new enzymes",
              "[NEWS] ai drug discovery cuts research time dramatically",
              "[NEWS] biotech venture funding surges in 2026"
            ]
          }
          EOF

      - name: Commit update
        run: |
          git config --global user.name "bioacc-bot"
          git config --global user.email "bot@bioacc"

          git add news.json

          git commit -m "update biotech intelligence feed" || echo "no changes"

          git push