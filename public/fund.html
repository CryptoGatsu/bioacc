<body>

<div class="nav">
<div>bio/acc fund</div>
<div>
<a href="index.html">home</a>
<a href="manifesto.html">manifesto</a>
<a href="fund.html">fund</a>
</div>
</div>

<div class="container">

<h1>biotech startup fund</h1>

<button class="button" onclick="connectWallet()">connect wallet</button>
<div id="walletStatus"></div>

<h2>submit project</h2>
<div class="box">

<input id="name" placeholder="project name (required)">
<input id="github" placeholder="github link (required)">
<input id="social" placeholder="social link (required)">
<input id="website" placeholder="website (optional)">
<input type="file" id="logo">
<textarea id="desc"></textarea>

<div class="confirm-box" onclick="toggleConfirm()" id="confirmBox">
✔ confirm 14+ days
<input type="checkbox" id="confirm" hidden>
</div>

<button class="button" onclick="submitProject()">submit</button>
<div id="status"></div>

</div>

<h2>leaderboard</h2>
<div id="feed"></div>

</div>

<script>

const TOKENS_PER_VOTE = 1000000

let wallet=null
let tokenBalance=0
let backendData=null

function toggleConfirm(){
const box=document.getElementById("confirmBox")
const input=document.getElementById("confirm")
input.checked=!input.checked
box.classList.toggle("active")
}

async function signMessage(message){
const provider=window.solana
const encoded=new TextEncoder().encode(message)
const signed=await provider.signMessage(encoded,"utf8")
return {signature:Array.from(signed.signature)}
}

async function connectWallet(){
const res=await window.solana.connect()
wallet=res.publicKey.toString()

tokenBalance=await getTokenBalance(wallet)

document.getElementById("walletStatus").innerText=
`wallet: ${wallet.slice(0,4)}... | tokens: ${Math.floor(tokenBalance)}`

loadProjects()
}

async function getTokenBalance(wallet){
const res=await fetch(`https://api.helius.xyz/v0/addresses/${wallet}/balances?api-key=abe30281-08a6-4f68-921b-4da93db84835`)
const data=await res.json()
const token=data.tokens.find(t=>t.mint==="CLP3exiqE8drZSzwhPas257cTh1evzq6nr7i1Xwvpump")
return token?token.amount/(10**(token.decimals||6)):0
}

async function loadProjects(){
const res=await fetch("https://raw.githubusercontent.com/cryptogatsu/bioacc/main/submissions.json?t="+Date.now())
backendData=await res.json()

let html=backendData.projects.map((p,i)=>{

const votedAt=backendData.votes?.[wallet]
const votedIndex=backendData.voteIndex?.[wallet]
const votedToday=votedAt && Date.now()-votedAt<86400000

return `
<div class="project">
<b>${p.name}</b><br>
votes: ${p.votes||0}

${votedToday && votedIndex===i ? `<div class="voted-today">✔ you voted here today</div>`:""}

<div class="vote" onclick="vote(${i})">
${votedToday?"locked":"vote"}
</div>
</div>
`
}).join("")

document.getElementById("feed").innerHTML=html
}

async function vote(index){

if(!wallet) return alert("connect wallet")

// ✅ TOKEN CHECK BEFORE SIGN
if(tokenBalance < 1){
return alert("you need at least 1M tokens to vote")
}

const votedAt=backendData.votes?.[wallet]
if(votedAt && Date.now()-votedAt<86400000){
return alert("already voted today")
}

const timestamp=Date.now()
const message=`vote:${wallet}:${index}:${timestamp}`

// ONLY NOW SIGN
const signed=await signMessage(message)

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"vote",
index,
wallet,
timestamp,
signature:signed.signature,
message
})
})

loadProjects()
}

async function submitProject(){

if(!wallet) return alert("connect wallet")

if(!document.getElementById("confirm").checked){
return alert("please confirm 14+ days")
}

const timestamp=Date.now()
const message=`submit:${wallet}:${timestamp}`
const signed=await signMessage(message)

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"submit",
data:{
name:document.getElementById("name").value,
wallet,
timestamp,
signature:signed.signature,
message
}
})
})

document.getElementById("status").innerText="submitted"
loadProjects()
}

</script>

</body>
</html>
