.top1{ border:1px solid gold; box-shadow:0 0 15px gold; }

</head>

<body>

<div class="nav">
<div>bio/acc fund</div>
<div>
<a href="index.html">home</a>
<a href="manifesto.html">manifesto</a>
<a href="fund.html">fund</a>
</div>
</div>

<div class="container">

<h1>biotech startup fund</h1>

<button class="button" onclick="connectWallet()">connect wallet</button>
<div id="walletStatus"></div>

<h2>submit project</h2>
<div class="box">

<input id="name" placeholder="project name (required)">
<input id="github" placeholder="github link (required)">
<input id="social" placeholder="social link (required)">
<input id="website" placeholder="website (optional)">
<input type="file" id="logo" class="file-input" accept="image/*">
<textarea id="desc" maxlength="200" placeholder="description (max 200 chars)"></textarea>

<div class="confirm-box" onclick="toggleConfirm()" id="confirmBox">
✔ confirm 14+ days
<input type="checkbox" id="confirm" hidden>
</div>

<button class="button" onclick="submitProject()">submit</button>
<div id="status"></div>
<div id="submitCooldown"></div>

</div>

<h2>leaderboard</h2>
<div id="feed"></div>
<div id="pagination"></div>

</div>

<script>

let wallet=null
let backendData=null

let currentPage=0
const perPage=5

function timeLeft(ts){
const remaining=86400000-(Date.now()-ts)
if(remaining<=0) return ""
const h=Math.floor(remaining/3600000)
const m=Math.floor((remaining%3600000)/60000)
return `${h}h ${m}m`
}

async function signMessage(message){
const provider=window.solana
const encoded=new TextEncoder().encode(message)
const signed=await provider.signMessage(encoded,"utf8")
return {
signature:Array.from(signed.signature),
publicKey:provider.publicKey.toString()
}
}

function toggleConfirm(){
const box=document.getElementById("confirmBox")
const input=document.getElementById("confirm")
input.checked=!input.checked
box.classList.toggle("active")
}

async function connectWallet(){
const res=await window.solana.connect()
wallet=res.publicKey.toString()

document.getElementById("walletStatus").innerText =
`wallet: ${wallet.slice(0,4)}...${wallet.slice(-4)}`

loadProjects()
}

async function loadProjects(){

const res=await fetch("https://raw.githubusercontent.com/cryptogatsu/bioacc/main/submissions.json?t="+Date.now())
const data=await res.json()
backendData=data

const votedAt=data.votes?.[wallet]
const votedIndex=data.voteIndex?.[wallet]
const submittedAt=data.submissions?.[wallet]

if(submittedAt && Date.now()-submittedAt<86400000){
document.getElementById("submitCooldown").innerText =
`submit cooldown: ${timeLeft(submittedAt)}`
}

let projects=data.projects.sort((a,b)=>(b.votes||0)-(a.votes||0))

const start=currentPage*perPage
const pageProjects=projects.slice(start,start+perPage)

let html=pageProjects.map((p,i)=>{

const globalIndex=start+i
const votedToday=votedAt && Date.now()-votedAt<86400000
const isMine=votedIndex===globalIndex

return `
<div class="project ${votedToday?"locked":""}">

<b>${p.name}</b>
<br>votes: ${p.votes||0}

${votedToday && isMine ? `<div class="voted-today">✔ you voted here today</div>`:""}

<div class="vote" onclick="vote(${globalIndex})">
${votedToday?"locked":"vote"}
</div>

<div class="cooldown">
${votedToday?`cooldown: ${timeLeft(votedAt)}`:""}
</div>

</div>
`

}).join("")

document.getElementById("feed").innerHTML=html
}

async function vote(index){

if(!wallet) return alert("connect wallet")

const votedAt=backendData.votes?.[wallet]
if(votedAt && Date.now()-votedAt<86400000){
return alert("already voted today")
}

const timestamp=Date.now()
const message=`vote:${wallet}:${index}:${timestamp}`
const signed=await signMessage(message)

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"vote",
index,
wallet,
timestamp,
signature:signed.signature,
message
})
})

loadProjects()
}

async function submitProject(){

if(!wallet) return alert("connect wallet")

const last=backendData.submissions?.[wallet]
if(last && Date.now()-last<86400000){
return alert("already submitted today")
}

const name=document.getElementById("name").value.trim()

const timestamp=Date.now()
const message=`submit:${wallet}:${timestamp}`
const signed=await signMessage(message)

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"submit",
data:{name,wallet,timestamp,signature:signed.signature,message}
})
})

loadProjects()
}

loadProjects()

</script>

</body>
</html>
