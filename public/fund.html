<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>bio/acc fund</title>

<style>

body{
margin:0;
background:#000;
color:#cfcfcf;
font-family:Courier New, monospace;
}

/* NAV */
.nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:15px 25px;
background:#000;
border-bottom:1px solid #111;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
}

.nav a{
color:#7CFF3A;
text-decoration:none;
margin-left:20px;
}

/* LAYOUT */
.container{
max-width:800px;
margin:auto;
padding:100px 20px;
text-align:center;
}

.box{
border:1px solid #222;
padding:25px;
margin-top:20px;
text-align:left;
}

.project{
border:1px solid #222;
padding:20px;
margin-bottom:20px;
}

input, textarea{
width:100%;
background:#050505;
border:1px solid #222;
color:#cfcfcf;
padding:10px;
margin-top:10px;
}

.button{
background:#7CFF3A;
color:black;
padding:10px 15px;
margin-top:15px;
cursor:pointer;
border:none;
}

.vote{
color:#7CFF3A;
cursor:pointer;
margin-top:10px;
}

.cooldown{
color:#888;
font-size:12px;
margin-top:5px;
}

</style>

</head>

<body>

<div class="nav">
<div>bio/acc fund</div>
<div>
<a href="index.html">home</a>
<a href="manifesto.html">manifesto</a>
<a href="fund.html">fund</a>
</div>
</div>

<div class="container">

<button class="button" onclick="connectWallet()">connect wallet</button>
<div id="walletStatus"></div>

<div class="box">

<input id="name" placeholder="project name">
<input id="github" placeholder="github link">
<input id="social" placeholder="social link">
<textarea id="desc" placeholder="description"></textarea>

<label>
<input type="checkbox" id="confirm"> confirm 14+ days
</label>

<button class="button" onclick="submitProject()">submit</button>
<div id="status"></div>

</div>

<h2>leaderboard</h2>
<div id="feed"></div>

</div>

<script>

const HELIUS_KEY = "abe30281-08a6-4f68-921b-4da93db84835"
const TOKEN_MINT = "CLP3exiqE8drZSzwhPas257cTh1evzq6nr7i1Xwvpump"
const TOKENS_PER_VOTE = 1000000

let wallet = null
let userVotes = 0

let voteTimestamps = JSON.parse(localStorage.getItem("voteTimestamps") || "{}")

// WALLET
async function connectWallet(){

if(!window.solana) return alert("install phantom")

const res = await window.solana.connect()
wallet = res.publicKey.toString()

const balance = await getTokenBalance(wallet)
userVotes = Math.floor(balance / TOKENS_PER_VOTE)

document.getElementById("walletStatus").innerText =
`wallet: ${wallet.slice(0,4)}...${wallet.slice(-4)} | votes: ${userVotes}`
}

// TOKEN BALANCE
async function getTokenBalance(wallet){

const res = await fetch(`https://api.helius.xyz/v0/addresses/${wallet}/balances?api-key=${HELIUS_KEY}`)
const data = await res.json()

const token = data.tokens.find(t => t.mint === TOKEN_MINT)
return token ? token.amount : 0
}

// LOAD PROJECTS
async function loadProjects(){

const res = await fetch("https://raw.githubusercontent.com/cryptogatsu/bioacc/main/submissions.json?cache="+Date.now())
const data = await res.json()

const feed = document.getElementById("feed")

if(!data.projects.length){
feed.innerHTML = "[no projects yet]"
return
}

feed.innerHTML = data.projects.map((p,i)=>{

const lastVote = voteTimestamps[i] || 0
const now = Date.now()
const cooldown = 86400000 // 24h
const remaining = cooldown - (now - lastVote)

let cooldownText = ""
let canVote = true

if(remaining > 0){
canVote = false
const hours = Math.floor(remaining/3600000)
const mins = Math.floor((remaining%3600000)/60000)
cooldownText = `cooldown: ${hours}h ${mins}m`
}

return `
<div class="project">

<b>${p.name}</b><br/><br/>
<a href="${p.github}" target="_blank">github</a><br/><br/>
${p.desc}<br/><br/>

votes: ${p.votes || 0}<br/>

<input id="vote-${i}" type="number" min="1" placeholder="votes">

<div class="vote" onclick="vote(${i})">
${canVote ? "vote" : "locked"}
</div>

<div class="cooldown">${cooldownText}</div>

</div>
`

}).join("")

}

// VOTE
async function vote(index){

if(!wallet) return alert("connect wallet")

const lastVote = voteTimestamps[index] || 0
const now = Date.now()

if(now - lastVote < 86400000){
alert("wait 24h before voting again")
return
}

const input = document.getElementById(`vote-${index}`)
const amount = parseInt(input.value)

if(!amount || amount <= 0){
alert("enter vote amount")
return
}

if(amount > userVotes){
alert("not enough votes")
return
}

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"vote",
index,
weight: amount,
wallet
})
})

voteTimestamps[index] = now
localStorage.setItem("voteTimestamps", JSON.stringify(voteTimestamps))

loadProjects()

}

// SUBMIT
async function submitProject(){

if(!wallet) return alert("connect wallet")

if(!document.getElementById("confirm").checked){
alert("confirm 14+ days")
return
}

const payload = {
action:"submit",
data:{
name: name.value,
github: github.value,
social: social.value,
desc: desc.value,
votes:0,
wallet
}
}

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
})

document.getElementById("status").innerText="submitted ✅"
loadProjects()

}

// INIT
loadProjects()
setInterval(loadProjects, 30000)

</script>

</body>
</html>
