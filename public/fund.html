<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>bio/acc fund</title>

<style>

/* (UNCHANGED STYLES ABOVE) */

.top1{ border:1px solid gold; box-shadow:0 0 15px gold; }
.top2{ border:1px solid silver; box-shadow:0 0 10px silver; }
.top3{ border:1px solid #cd7f32; box-shadow:0 0 10px #cd7f32; }

</style>
</head>

<body>

<!-- (UNCHANGED HTML ABOVE) -->

<script>

const TOKENS_PER_VOTE = 1000000

let wallet=null
let tokenBalance=0
let voteBank=0

let voteTimestamps = JSON.parse(localStorage.getItem("voteTimestamps")||"{}")
let voteCounts = JSON.parse(localStorage.getItem("voteCounts")||"{}")

let currentPage=0
const perPage=5

/* ✅ FIX 1 — RESTORE TOKEN DISPLAY */
async function connectWallet(){
const res=await window.solana.connect()
wallet=res.publicKey.toString()

tokenBalance = await getTokenBalance(wallet)
voteBank = Math.floor(tokenBalance / TOKENS_PER_VOTE)

document.getElementById("walletStatus").innerText =
`wallet: ${wallet.slice(0,4)}...${wallet.slice(-4)} | tokens: ${Math.floor(tokenBalance)} | votes: ${voteBank}`

loadProjects()
}

/* ✅ REQUIRED FOR TOKEN DISPLAY */
async function getTokenBalance(wallet){
const res = await fetch(`https://api.helius.xyz/v0/addresses/${wallet}/balances?api-key=abe30281-08a6-4f68-921b-4da93db84835`)
const data = await res.json()
const token = data.tokens.find(t => t.mint === "CLP3exiqE8drZSzwhPas257cTh1evzq6nr7i1Xwvpump")
if(!token) return 0
return token.amount / (10 ** (token.decimals || 6))
}

function getProjectId(p){
return p.github||p.name
}

function addTicker(text){
document.getElementById("ticker").innerHTML=`<span>${text}</span>`
}

function getCooldownText(last){
const remaining=86400000-(Date.now()-last)
if(remaining<=0) return ""
const h=Math.floor(remaining/3600000)
const m=Math.floor((remaining%3600000)/60000)
return `${h}h ${m}m`
}

async function loadProjects(){

const res=await fetch("https://raw.githubusercontent.com/cryptogatsu/bioacc/main/submissions.json?t="+Date.now())
const data=await res.json()

let projects=data.projects.sort((a,b)=>(b.votes||0)-(a.votes||0))

const totalPages = Math.ceil(projects.length / perPage)

const start=currentPage*perPage
const pageProjects=projects.slice(start,start+perPage)

/* ✅ FIX 2 — BUILD PROJECT HTML */
let html = pageProjects.map((p,i)=>{

const id=getProjectId(p)

const last=voteTimestamps[id]||0
const hasCooldown=(Date.now()-last<86400000)

let cooldownText = hasCooldown ? `cooldown: ${getCooldownText(last)}` : ""

let locked = hasCooldown || (voteCounts[id]||0)>=2

let rank=""
if(start+i===0) rank="top1"
if(start+i===1) rank="top2"
if(start+i===2) rank="top3"

let totalVotes=voteCounts[id]||0

return `
<div class="project ${rank}">

${p.logo?`<img class="logo" src="${p.logo}">`:""}

<div class="project-content">

<b>${p.name}</b>

<div class="links">
<a href="${p.github}" target="_blank">github</a>
<a href="${p.social}" target="_blank">social</a>
${p.website?`<a href="${p.website}" target="_blank">website</a>`:""}
</div>

<div class="desc">${p.desc}</div>

<br>
votes: ${p.votes||0}

<br><br>

<input class="vote-input" id="vote-${i}" placeholder="votes">

<div class="vote" onclick="vote('${id}',${start+i})">
${locked?"locked":"vote"}
</div>

<div class="cooldown">
${cooldownText}
${totalVotes>=2?" | max votes reached":""}
</div>

</div>
</div>
`

}).join("")

/* ✅ FIX 3 — SMART PAGINATION */
let paginationHTML=""

if(totalPages>1){

paginationHTML += `<div class="pagination">`

if(currentPage>0){
paginationHTML += `<button onclick="prevPage()" class="button">prev</button>`
}

for(let i=0;i<totalPages;i++){
paginationHTML += `
<button onclick="goPage(${i})" class="button">
${i+1}
</button>`
}

if(currentPage < totalPages-1){
paginationHTML += `<button onclick="nextPage()" class="button">next</button>`
}

paginationHTML += `</div>`
}

document.getElementById("feed").innerHTML = html + paginationHTML
}

/* ✅ FIX 4 — INSTANT UI UPDATE */
async function vote(id,index){

if(!wallet) return alert("connect wallet")

const last=voteTimestamps[id]||0
if(Date.now()-last<86400000) return alert("daily limit")

if((voteCounts[id]||0)>=2) return alert("max votes reached")

const amount=parseInt(document.getElementById(`vote-${index%perPage}`).value)

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({action:"vote",index,weight:amount})
})

voteTimestamps[id]=Date.now()
voteCounts[id]=(voteCounts[id]||0)+1

localStorage.setItem("voteTimestamps",JSON.stringify(voteTimestamps))
localStorage.setItem("voteCounts",JSON.stringify(voteCounts))

addTicker(`${amount} votes → ${id}`)

await loadProjects()
}

function nextPage(){currentPage++;loadProjects()}
function prevPage(){if(currentPage>0)currentPage--;loadProjects()}

/* ✅ NEW */
function goPage(p){
currentPage = p
loadProjects()
}

loadProjects()

</script>

</body>
</html>
