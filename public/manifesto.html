<style>

}

}

.container{

margin:auto;

}

h1{color:white;font-size:34px;text-align:center;margin-bottom:40px;}

.section{margin-bottom:40px;}

button{

</head>

<body>

<div class="nav">
<div>bio/acc manifesto</div>
<div>
<a href="index.html">home</a>
<a href="fund.html">fund</a>
</div>
</div>

<div class="container">

<h1>the bio/acc manifesto</h1>

<!-- (ALL TEXT SECTIONS UNCHANGED) -->

<h2>sign the manifesto</h2>

<button onclick="connectWallet()">connect wallet</button>
<p id="walletStatus"></p>

<textarea id="note" placeholder="leave a note (optional)"></textarea>
<button onclick="signManifesto()">sign manifesto</button>

<div class="counter" id="signatureCount">0 people signed</div>
<div class="signatures" id="signatures"></div>

<footer>
bio/acc is a decentralized movement accelerating biotechnology.
</footer>

</div>

<script>

let walletAddress=null

async function connectWallet(){
const provider=window.solana
if(!provider || !provider.isPhantom){
alert("Phantom not found")
return
}
const res=await provider.connect()
walletAddress=res.publicKey.toString()

document.getElementById("walletStatus").innerText=
walletAddress.slice(0,4)+"..."+walletAddress.slice(-4)

loadSignatures()
}

// 🔥 LOAD FROM BACKEND
async function loadSignatures(){
const res=await fetch("https://raw.githubusercontent.com/cryptogatsu/bioacc/main/submissions.json?t="+Date.now())
const data=await res.json()

const sigs=data.manifesto || []

render(sigs)
}

function render(sigs){
const list=document.getElementById("signatures")
const count=document.getElementById("signatureCount")

list.innerHTML=""

sigs.forEach(sig=>{
const el=document.createElement("div")
el.className="signature"
el.innerText=`> ${sig.wallet.slice(0,4)}...${sig.wallet.slice(-4)} — ${sig.note}`
list.appendChild(el)
})

count.innerText=sigs.length+" people have signed the bio/acc manifesto"
}

// 🔥 SIGN + SAVE TO BACKEND
async function signManifesto(){

if(!walletAddress) return alert("connect wallet")

const note=document.getElementById("note").value || "signed manifesto"

const timestamp=Date.now()
const message=`manifesto:${walletAddress}:${timestamp}`

const encoded=new TextEncoder().encode(message)
const signed=await window.solana.signMessage(encoded,"utf8")

await fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
action:"signManifesto",
data:{
wallet:walletAddress,
note,
timestamp,
signature:Array.from(signed.signature),
message
}
})
})

document.getElementById("note").value=""
loadSignatures()
}

// initial load
loadSignatures()

</script>

</body>
</html>
